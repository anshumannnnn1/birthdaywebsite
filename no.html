<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Denied 😏</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a1a1a, #333);
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

p {
    font-size: 16px;
    color: #ccc;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h1>😏 Oops!</h1>
    <p>Sorry, this message is only for her 💖</p>

    <button onclick="goBack()">Go Back</button>
</div>

<script>
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
